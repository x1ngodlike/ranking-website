<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>总览数据</title>
    <style id="theme-vars">
/* World Cup Winning Report - Cinematic Immersive Style */
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

:root {
  /* Brand Colors */
  --brand-primary: #D4A853;
  --brand-primary-light: #F0D68A;
  --brand-primary-dark: #A07D2E;
  --brand-accent: #E84855;
  --brand-accent-light: #FF6B78;
  --brand-accent-dark: #B8303C;

  /* Surface Colors */
  --bg-base: #0A0A0F;
  --bg-surface: #14141F;
  --bg-surface-elevated: #1C1C2A;
  --bg-overlay: rgba(10, 10, 15, 0.75);

  /* Text Colors */
  --text-primary: #F5F0E8;
  --text-secondary: rgba(245, 240, 232, 0.7);
  --text-muted: rgba(245, 240, 232, 0.4);
  --text-accent: #D4A853;
  --text-accent-bright: #F0D68A;

  /* Data Colors */
  --color-win: #4ADE80;
  --color-win-dim: rgba(74, 222, 128, 0.15);
  --color-profit: #4ADE80;
  --color-hot: #F97316;
  --color-hot-dim: rgba(249, 115, 22, 0.15);
  --color-streak: #FB923C;

  /* Gradients */
  --gradient-gold: linear-gradient(135deg, #D4A853 0%, #F0D68A 50%, #D4A853 100%);
  --gradient-warm: linear-gradient(135deg, #D4A853 0%, #E84855 100%);
  --gradient-deep: linear-gradient(180deg, rgba(10,10,15,0) 0%, rgba(10,10,15,0.8) 100%);

  /* Spacing */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 32px;
  --space-2xl: 48px;
  --space-3xl: 64px;

  /* Radius */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  /* Typography */
  --font-display: 'Oswald', system-ui, sans-serif;
  --font-body: 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;

  /* Motion */
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
}

/* Display font class */
.font-display {
  font-family: var(--font-display);
  letter-spacing: 0.03em;
  text-transform: uppercase;
}

/* Body font */
.font-body {
  font-family: var(--font-body);
}

/* Mono font for numbers */
.font-mono {
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
}

/* Gold text gradient */
.text-gradient-gold {
  background: var(--gradient-gold);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* Warm gradient text */
.text-gradient-warm {
  background: var(--gradient-warm);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* Cinematic overlay */
.cinematic-overlay {
  position: relative;
}

.cinematic-overlay::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(180deg, rgba(10,10,15,0.3) 0%, rgba(10,10,15,0.1) 40%, rgba(10,10,15,0.7) 100%),
    radial-gradient(ellipse at center, transparent 40%, rgba(10,10,15,0.4) 100%);
  pointer-events: none;
  z-index: 1;
}

/* Glow effects */
.glow-gold {
  box-shadow: 0 0 30px rgba(212, 168, 83, 0.3), 0 0 60px rgba(212, 168, 83, 0.1);
}

.glow-text-gold {
  text-shadow: 0 0 20px rgba(212, 168, 83, 0.4), 0 0 40px rgba(212, 168, 83, 0.2);
}

/* Card glass effect */
.glass-card {
  background: rgba(20, 20, 31, 0.6);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(212, 168, 83, 0.15);
  border-radius: var(--radius-lg);
}

/* Full bleed image background */
.bg-bleed {
  position: fixed;
  inset: 0;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* Shimmer animation for loading states */
@keyframes shimmer {
  0% { background-position: -200% center; }
  100% { background-position: 200% center; }
}

/* Particle-like decorative dots */
@keyframes float {
  0%, 100% { transform: translateY(0px) scale(1); opacity: 0.3; }
  50% { transform: translateY(-10px) scale(1.2); opacity: 0.6; }
}

/* Progress bar animation */
@keyframes progressFill {
  from { width: 0%; }
}

/* Number counter animation */
@keyframes countIn {
  from { opacity: 0; transform: translateY(10px) scale(0.9); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--brand-primary);
    --color-accent: var(--brand-accent);
  }
  @layer base {
    body { background: var(--bg-base); color: var(--text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }

      /* Stat card entrance animation */
      .stat-card {
        animation: cardFadeIn 0.6s var(--ease-smooth) both;
      }
      .stat-card:nth-child(1) { animation-delay: 0.1s; }
      .stat-card:nth-child(2) { animation-delay: 0.2s; }
      .stat-card:nth-child(3) { animation-delay: 0.3s; }
      .stat-card:nth-child(4) { animation-delay: 0.4s; }

      @keyframes cardFadeIn {
        from {
          opacity: 0;
          transform: translateY(16px) scale(0.96);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      /* Subtle glow pulse on cards */
      .stat-card::after {
        content: '';
        position: absolute;
        inset: -1px;
        border-radius: inherit;
        background: linear-gradient(135deg, rgba(212,168,83,0.08), transparent 60%);
        pointer-events: none;
        z-index: 0;
      }

      /* Background ambient glow */
      .ambient-glow {
        position: fixed;
        width: 200px;
        height: 200px;
        border-radius: 50%;
        filter: blur(80px);
        pointer-events: none;
        z-index: 0;
        animation: ambientDrift 8s ease-in-out infinite alternate;
      }

      @keyframes ambientDrift {
        0% { transform: translate(0, 0); }
        100% { transform: translate(30px, -20px); }
      }

      /* Gold value shimmer */
      .value-gold {
        color: var(--brand-primary);
        text-shadow: 0 0 12px rgba(212, 168, 83, 0.3);
      }

      /* Chapter label */
      .chapter-label {
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.2em;
        color: var(--brand-primary);
        opacity: 0.7;
        text-transform: uppercase;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased overflow-hidden" style="background: var(--bg-base);">

    <!-- Background image layer at 20% opacity -->
    <div class="bg-bleed" style="opacity: 0.2; z-index: 0; background-image: url('../assets/goal-net.jpg');"></div>

    <!-- Dark overlay on top of background image -->
    <div style="position: fixed; inset: 0; background: rgba(10, 10, 15, 0.85); z-index: 1; pointer-events: none;"></div>

    <!-- Ambient glow effects -->
    <div class="ambient-glow" style="top: 10%; left: -10%; background: rgba(212, 168, 83, 0.06);"></div>
    <div class="ambient-glow" style="bottom: 15%; right: -5%; background: rgba(74, 222, 128, 0.04); animation-delay: -4s;"></div>

    <!-- Main content -->
    <main class="relative flex flex-col justify-center min-h-screen px-6 py-12" style="z-index: 2; max-width: 375px; margin: 0 auto; width: 100%;">

        <!-- Header section -->
        <div class="mb-8" style="animation: cardFadeIn 0.5s var(--ease-smooth) both;">
            <p class="chapter-label mb-3">CHAPTER 02</p>
            <h1 class="font-display" style="font-size: 28px; font-weight: 600; color: var(--text-primary); line-height: 1.2;">
                这个世界杯
            </h1>
            <p class="font-body mt-1" style="font-size: 14px; color: rgba(245, 240, 232, 0.6);">
                你一共
            </p>
        </div>

        <!-- 2x2 stat cards grid -->
        <div class="grid grid-cols-2 gap-3 mb-8">

            <!-- Card 1: 记录中奖 -->
            <div class="stat-card glass-card relative flex flex-col items-center text-center" style="padding: 20px;">
                <span style="font-size: 28px; margin-bottom: 8px; filter: grayscale(0.2);">🎫</span>
                <span class="font-mono" style="font-size: 28px; font-weight: 700; color: var(--text-primary); line-height: 1.2;">
                    28 <span style="font-size: 16px; font-weight: 400; opacity: 0.6;">笔</span>
                </span>
                <span class="font-body mt-1" style="font-size: 12px; color: rgba(245, 240, 232, 0.5);">
                    记录中奖
                </span>
            </div>

            <!-- Card 2: 猜中比赛 -->
            <div class="stat-card glass-card relative flex flex-col items-center text-center" style="padding: 20px;">
                <span style="font-size: 28px; margin-bottom: 8px;">⚽</span>
                <span class="font-mono" style="font-size: 28px; font-weight: 700; color: var(--color-win); line-height: 1.2;">
                    12 <span style="font-size: 16px; font-weight: 400; opacity: 0.6;">场</span>
                </span>
                <span class="font-body mt-1" style="font-size: 12px; color: rgba(245, 240, 232, 0.5);">
                    猜中比赛
                </span>
            </div>

            <!-- Card 3: 累计盈利 -->
            <div class="stat-card glass-card relative flex flex-col items-center text-center" style="padding: 20px;">
                <span style="font-size: 28px; margin-bottom: 8px;">💰</span>
                <span class="font-mono value-gold" style="font-size: 28px; font-weight: 700; line-height: 1.2;">
                    ¥3,680
                </span>
                <span class="font-body mt-1" style="font-size: 12px; color: rgba(245, 240, 232, 0.5);">
                    累计盈利
                </span>
            </div>

            <!-- Card 4: 中奖天数 -->
            <div class="stat-card glass-card relative flex flex-col items-center text-center" style="padding: 20px;">
                <span style="font-size: 28px; margin-bottom: 8px;">📅</span>
                <span class="font-mono" style="font-size: 28px; font-weight: 700; color: var(--text-primary); line-height: 1.2;">
                    8 <span style="font-size: 16px; font-weight: 400; opacity: 0.6;">天</span>
                </span>
                <span class="font-body mt-1" style="font-size: 12px; color: rgba(245, 240, 232, 0.5);">
                    中奖天数
                </span>
            </div>

        </div>

        <!-- Bottom insight line -->
        <p class="font-body text-center" style="font-size: 13px; color: rgba(245, 240, 232, 0.4); font-style: italic; animation: cardFadeIn 0.6s 0.5s var(--ease-smooth) both;">
            相当于每天赚了 ¥460
        </p>

        <!-- Subtle gold divider -->
        <div class="mt-8 mx-auto" style="width: 40px; height: 1px; background: linear-gradient(90deg, transparent, var(--brand-primary), transparent); opacity: 0.3; animation: cardFadeIn 0.6s 0.6s var(--ease-smooth) both;"></div>

    </main>

</body>
</html>
