<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>开门红</title>
    <style id="theme-vars">
/* World Cup Winning Report - Cinematic Immersive Style */
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

:root {
  /* Brand Colors */
  --brand-primary: #D4A853;
  --brand-primary-light: #F0D68A;
  --brand-primary-dark: #A07D2E;
  --brand-accent: #E84855;
  --brand-accent-light: #FF6B78;
  --brand-accent-dark: #B8303C;

  /* Surface Colors */
  --bg-base: #0A0A0F;
  --bg-surface: #14141F;
  --bg-surface-elevated: #1C1C2A;
  --bg-overlay: rgba(10, 10, 15, 0.75);

  /* Text Colors */
  --text-primary: #F5F0E8;
  --text-secondary: rgba(245, 240, 232, 0.7);
  --text-muted: rgba(245, 240, 232, 0.4);
  --text-accent: #D4A853;
  --text-accent-bright: #F0D68A;

  /* Data Colors */
  --color-win: #4ADE80;
  --color-win-dim: rgba(74, 222, 128, 0.15);
  --color-profit: #4ADE80;
  --color-hot: #F97316;
  --color-hot-dim: rgba(249, 115, 22, 0.15);
  --color-streak: #FB923C;

  /* Gradients */
  --gradient-gold: linear-gradient(135deg, #D4A853 0%, #F0D68A 50%, #D4A853 100%);
  --gradient-warm: linear-gradient(135deg, #D4A853 0%, #E84855 100%);
  --gradient-deep: linear-gradient(180deg, rgba(10,10,15,0) 0%, rgba(10,10,15,0.8) 100%);

  /* Spacing */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 32px;
  --space-2xl: 48px;
  --space-3xl: 64px;

  /* Radius */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  /* Typography */
  --font-display: 'Oswald', system-ui, sans-serif;
  --font-body: 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;

  /* Motion */
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
}

/* Display font class */
.font-display {
  font-family: var(--font-display);
  letter-spacing: 0.03em;
  text-transform: uppercase;
}

/* Body font */
.font-body {
  font-family: var(--font-body);
}

/* Mono font for numbers */
.font-mono {
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
}

/* Gold text gradient */
.text-gradient-gold {
  background: var(--gradient-gold);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* Warm gradient text */
.text-gradient-warm {
  background: var(--gradient-warm);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* Cinematic overlay */
.cinematic-overlay {
  position: relative;
}

.cinematic-overlay::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(180deg, rgba(10,10,15,0.3) 0%, rgba(10,10,15,0.1) 40%, rgba(10,10,15,0.7) 100%),
    radial-gradient(ellipse at center, transparent 40%, rgba(10,10,15,0.4) 100%);
  pointer-events: none;
  z-index: 1;
}

/* Glow effects */
.glow-gold {
  box-shadow: 0 0 30px rgba(212, 168, 83, 0.3), 0 0 60px rgba(212, 168, 83, 0.1);
}

.glow-text-gold {
  text-shadow: 0 0 20px rgba(212, 168, 83, 0.4), 0 0 40px rgba(212, 168, 83, 0.2);
}

/* Card glass effect */
.glass-card {
  background: rgba(20, 20, 31, 0.6);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(212, 168, 83, 0.15);
  border-radius: var(--radius-lg);
}

/* Full bleed image background */
.bg-bleed {
  position: fixed;
  inset: 0;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* Shimmer animation for loading states */
@keyframes shimmer {
  0% { background-position: -200% center; }
  100% { background-position: 200% center; }
}

/* Particle-like decorative dots */
@keyframes float {
  0%, 100% { transform: translateY(0px) scale(1); opacity: 0.3; }
  50% { transform: translateY(-10px) scale(1.2); opacity: 0.6; }
}

/* Progress bar animation */
@keyframes progressFill {
  from { width: 0%; }
}

/* Number counter animation */
@keyframes countIn {
  from { opacity: 0; transform: translateY(10px) scale(0.9); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--brand-primary);
    --color-accent: var(--brand-accent);
  }
  @layer base {
    body { background: var(--bg-base); color: var(--text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }

      /* Page-specific styles */

      /* Green glow for win number */
      .glow-text-win {
        text-shadow:
          0 0 20px rgba(74, 222, 128, 0.5),
          0 0 40px rgba(74, 222, 128, 0.25),
          0 0 80px rgba(74, 222, 128, 0.1);
      }

      /* Gold horizontal rule */
      .gold-rule {
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent 0%,
          rgba(212, 168, 83, 0.6) 30%,
          rgba(212, 168, 83, 0.8) 50%,
          rgba(212, 168, 83, 0.6) 70%,
          transparent 100%
        );
      }

      /* Sparkle particle */
      .sparkle {
        position: absolute;
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: var(--brand-primary-light);
        animation: sparkle-float var(--duration, 3s) ease-in-out infinite;
        animation-delay: var(--delay, 0s);
        pointer-events: none;
      }

      @keyframes sparkle-float {
        0%, 100% {
          transform: translateY(0) scale(1);
          opacity: 0.15;
        }
        25% {
          transform: translateY(-12px) scale(1.3);
          opacity: 0.6;
        }
        50% {
          transform: translateY(-6px) scale(0.8);
          opacity: 0.35;
        }
        75% {
          transform: translateY(-16px) scale(1.1);
          opacity: 0.5;
        }
      }

      /* Fade-in animation for content blocks */
      @keyframes fade-up {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .animate-fade-up {
        animation: fade-up 0.8s var(--ease-smooth) forwards;
        opacity: 0;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased overflow-hidden">
    <main class="relative w-[375px] h-[100dvh] mx-auto overflow-hidden flex flex-col items-center justify-center"
          style="background: var(--bg-base);">

      <!-- Radial gold glow at top center -->
      <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[500px] h-[500px] rounded-full pointer-events-none"
           style="background: radial-gradient(ellipse at center, rgba(212,168,83,0.15) 0%, rgba(212,168,83,0.05) 40%, transparent 70%);"></div>

      <!-- Sparkle particles -->
      <div class="sparkle" style="top: 18%; left: 22%; --duration: 3.5s; --delay: 0s;"></div>
      <div class="sparkle" style="top: 32%; right: 18%; --duration: 4s; --delay: 1.2s;"></div>
      <div class="sparkle" style="top: 55%; left: 15%; --duration: 3s; --delay: 0.6s;"></div>

      <!-- Content container -->
      <div class="relative z-10 flex flex-col items-center text-center px-8 max-w-[320px]">

        <!-- Chapter label -->
        <div class="animate-fade-up" style="animation-delay: 0.1s;">
          <span class="font-display text-[12px] tracking-[4px]"
                style="color: var(--brand-primary);">
            CHAPTER 01
          </span>
        </div>

        <!-- Spacer -->
        <div class="h-8"></div>

        <!-- Section title -->
        <div class="animate-fade-up" style="animation-delay: 0.25s;">
          <h1 class="font-display text-[32px] leading-tight"
              style="color: var(--text-primary); text-transform: none;">
            一切的开始
          </h1>
        </div>

        <!-- Spacer -->
        <div class="h-6"></div>

        <!-- Date -->
        <div class="animate-fade-up" style="animation-delay: 0.4s;">
          <span class="font-mono text-[20px] font-medium"
                style="color: var(--brand-primary);">
            6月15日
          </span>
        </div>

        <!-- Spacer -->
        <div class="h-10"></div>

        <!-- Narrative text -->
        <div class="animate-fade-up" style="animation-delay: 0.55s;">
          <p class="font-body text-[16px] leading-relaxed"
             style="color: var(--text-secondary);">
            你记录了第一笔中奖
          </p>
        </div>

        <!-- Spacer -->
        <div class="h-12"></div>

        <!-- Big number highlight -->
        <div class="animate-fade-up" style="animation-delay: 0.7s;">
          <div class="font-mono text-[56px] font-bold leading-none glow-text-win"
               style="color: var(--color-win);">
            ¥260
          </div>
        </div>

        <!-- Spacer -->
        <div class="h-12"></div>

        <!-- Gold horizontal line -->
        <div class="animate-fade-up w-full" style="animation-delay: 0.85s;">
          <div class="gold-rule"></div>
        </div>

        <!-- Spacer -->
        <div class="h-10"></div>

        <!-- Bottom quote -->
        <div class="animate-fade-up" style="animation-delay: 1s;">
          <p class="font-body text-[14px] italic leading-relaxed"
             style="color: var(--text-muted);">
            开门红，是这个夏天最好的开场
          </p>
        </div>

      </div>

      <!-- Subtle vignette overlay for cinematic depth -->
      <div class="absolute inset-0 pointer-events-none z-20"
           style="background: radial-gradient(ellipse at center, transparent 50%, rgba(10,10,15,0.5) 100%);"></div>

    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
