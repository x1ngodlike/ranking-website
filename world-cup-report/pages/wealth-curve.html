<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>财富曲线</title>
    <style id="theme-vars">
/* World Cup Winning Report - Cinematic Immersive Style */
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

:root {
  /* Brand Colors */
  --brand-primary: #D4A853;
  --brand-primary-light: #F0D68A;
  --brand-primary-dark: #A07D2E;
  --brand-accent: #E84855;
  --brand-accent-light: #FF6B78;
  --brand-accent-dark: #B8303C;

  /* Surface Colors */
  --bg-base: #0A0A0F;
  --bg-surface: #14141F;
  --bg-surface-elevated: #1C1C2A;
  --bg-overlay: rgba(10, 10, 15, 0.75);

  /* Text Colors */
  --text-primary: #F5F0E8;
  --text-secondary: rgba(245, 240, 232, 0.7);
  --text-muted: rgba(245, 240, 232, 0.4);
  --text-accent: #D4A853;
  --text-accent-bright: #F0D68A;

  /* Data Colors */
  --color-win: #4ADE80;
  --color-win-dim: rgba(74, 222, 128, 0.15);
  --color-profit: #4ADE80;
  --color-hot: #F97316;
  --color-hot-dim: rgba(249, 115, 22, 0.15);
  --color-streak: #FB923C;

  /* Gradients */
  --gradient-gold: linear-gradient(135deg, #D4A853 0%, #F0D68A 50%, #D4A853 100%);
  --gradient-warm: linear-gradient(135deg, #D4A853 0%, #E84855 100%);
  --gradient-deep: linear-gradient(180deg, rgba(10,10,15,0) 0%, rgba(10,10,15,0.8) 100%);

  /* Spacing */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 32px;
  --space-2xl: 48px;
  --space-3xl: 64px;

  /* Radius */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  /* Typography */
  --font-display: 'Oswald', system-ui, sans-serif;
  --font-body: 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;

  /* Motion */
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
}

/* Display font class */
.font-display {
  font-family: var(--font-display);
  letter-spacing: 0.03em;
  text-transform: uppercase;
}

/* Body font */
.font-body {
  font-family: var(--font-body);
}

/* Mono font for numbers */
.font-mono {
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
}

/* Gold text gradient */
.text-gradient-gold {
  background: var(--gradient-gold);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* Warm gradient text */
.text-gradient-warm {
  background: var(--gradient-warm);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* Cinematic overlay */
.cinematic-overlay {
  position: relative;
}

.cinematic-overlay::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(180deg, rgba(10,10,15,0.3) 0%, rgba(10,10,15,0.1) 40%, rgba(10,10,15,0.7) 100%),
    radial-gradient(ellipse at center, transparent 40%, rgba(10,10,15,0.4) 100%);
  pointer-events: none;
  z-index: 1;
}

/* Glow effects */
.glow-gold {
  box-shadow: 0 0 30px rgba(212, 168, 83, 0.3), 0 0 60px rgba(212, 168, 83, 0.1);
}

.glow-text-gold {
  text-shadow: 0 0 20px rgba(212, 168, 83, 0.4), 0 0 40px rgba(212, 168, 83, 0.2);
}

/* Card glass effect */
.glass-card {
  background: rgba(20, 20, 31, 0.6);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(212, 168, 83, 0.15);
  border-radius: var(--radius-lg);
}

/* Full bleed image background */
.bg-bleed {
  position: fixed;
  inset: 0;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* Shimmer animation for loading states */
@keyframes shimmer {
  0% { background-position: -200% center; }
  100% { background-position: 200% center; }
}

/* Particle-like decorative dots */
@keyframes float {
  0%, 100% { transform: translateY(0px) scale(1); opacity: 0.3; }
  50% { transform: translateY(-10px) scale(1.2); opacity: 0.6; }
}

/* Progress bar animation */
@keyframes progressFill {
  from { width: 0%; }
}

/* Number counter animation */
@keyframes countIn {
  from { opacity: 0; transform: translateY(10px) scale(0.9); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--bg-base);
    --color-foreground: var(--text-primary);
  }
  @layer base {
    body { background: var(--bg-base); color: var(--text-primary); }
    td, th { word-break: break-all; word-break: auto-phrase; }
    th { white-space: nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main>

      <!-- ========== WEALTH CURVE PAGE ========== -->

      <!-- Background: dark with radial gold glow -->
      <div class="fixed inset-0 -z-10" style="background: radial-gradient(ellipse at 50% 45%, rgba(212,168,83,0.08) 0%, rgba(212,168,83,0.02) 35%, #0A0A0F 70%);"></div>

      <!-- Page container: mobile-first 375px, fullscreen immersive -->
      <div class="relative mx-auto min-h-screen flex flex-col items-center px-6 py-12" style="max-width: 375px;">

        <!-- Chapter label -->
        <div class="font-display glow-text-gold mb-4" style="font-size: 12px; color: var(--brand-primary); letter-spacing: 4px;">
          CHAPTER 03
        </div>

        <!-- Title -->
        <h1 class="font-display mb-2" style="font-size: 24px; color: var(--text-primary); letter-spacing: 0.02em;">
          你的财富曲线
        </h1>

        <!-- Subtitle -->
        <p class="font-body mb-10" style="font-size: 13px; color: var(--text-muted);">
          从第一笔到现在的旅程
        </p>

        <!-- SVG Chart Area -->
        <div class="relative w-full mb-4 glow-gold" style="max-width: 300px; border-radius: var(--radius-lg);">
          <svg viewBox="0 0 300 160" xmlns="http://www.w3.org/2000/svg" class="w-full" style="overflow: visible;">

            <!-- Gradient definition for area fill -->
            <defs>
              <linearGradient id="goldAreaGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#D4A853" stop-opacity="0.3"/>
                <stop offset="100%" stop-color="#D4A853" stop-opacity="0.02"/>
              </linearGradient>
              <!-- Glow filter for the line -->
              <filter id="lineGlow" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
                <feMerge>
                  <feMergeNode in="blur"/>
                  <feMergeNode in="SourceGraphic"/>
                </feMerge>
              </filter>
              <!-- Glow filter for end dot -->
              <filter id="dotGlow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
                <feMerge>
                  <feMergeNode in="blur"/>
                  <feMergeNode in="SourceGraphic"/>
                </feMerge>
              </filter>
            </defs>

            <!-- Grid lines (subtle) -->
            <line x1="0" y1="40" x2="300" y2="40" stroke="rgba(245,240,232,0.06)" stroke-width="0.5"/>
            <line x1="0" y1="80" x2="300" y2="80" stroke="rgba(245,240,232,0.06)" stroke-width="0.5"/>
            <line x1="0" y1="120" x2="300" y2="120" stroke="rgba(245,240,232,0.06)" stroke-width="0.5"/>

            <!-- Area fill under curve -->
            <path d="M 0,130 C 20,125 40,110 60,105 C 80,100 100,115 120,100 C 140,85 155,75 180,60 C 205,45 220,55 240,40 C 255,30 270,20 300,12 L 300,160 L 0,160 Z"
                  fill="url(#goldAreaGrad)" opacity="0">
              <animate attributeName="opacity" from="0" to="1" dur="2s" fill="freeze" begin="0.5s"/>
            </path>

            <!-- Main curve line with drawing animation -->
            <path d="M 0,130 C 20,125 40,110 60,105 C 80,100 100,115 120,100 C 140,85 155,75 180,60 C 205,45 220,55 240,40 C 255,30 270,20 300,12"
                  fill="none"
                  stroke="#D4A853"
                  stroke-width="2.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  filter="url(#lineGlow)"
                  stroke-dasharray="1000"
                  stroke-dashoffset="1000"
                  class="chart-line">
            </path>

            <!-- Start dot -->
            <circle cx="0" cy="130" r="3" fill="#D4A853" opacity="0">
              <animate attributeName="opacity" from="0" to="0.7" dur="0.4s" fill="freeze" begin="2s"/>
            </circle>

            <!-- Intermediate dots -->
            <circle cx="60" cy="105" r="2.5" fill="#D4A853" opacity="0">
              <animate attributeName="opacity" from="0" to="0.5" dur="0.3s" fill="freeze" begin="2.4s"/>
            </circle>
            <circle cx="120" cy="100" r="2.5" fill="#D4A853" opacity="0">
              <animate attributeName="opacity" from="0" to="0.5" dur="0.3s" fill="freeze" begin="2.7s"/>
            </circle>
            <circle cx="180" cy="60" r="2.5" fill="#D4A853" opacity="0">
              <animate attributeName="opacity" from="0" to="0.5" dur="0.3s" fill="freeze" begin="3.0s"/>
            </circle>
            <circle cx="240" cy="40" r="2.5" fill="#D4A853" opacity="0">
              <animate attributeName="opacity" from="0" to="0.5" dur="0.3s" fill="freeze" begin="3.3s"/>
            </circle>

            <!-- End dot with glow -->
            <circle cx="300" cy="12" r="5" fill="#D4A853" filter="url(#dotGlow)" opacity="0">
              <animate attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze" begin="3.5s"/>
            </circle>
            <circle cx="300" cy="12" r="2.5" fill="#FFFFFF" opacity="0">
              <animate attributeName="opacity" from="0" to="1" dur="0.4s" fill="freeze" begin="3.7s"/>
            </circle>

            <!-- Start label: ¥260 -->
            <text x="8" y="148" class="font-mono" font-size="11" fill="#D4A853" opacity="0">
              ¥260
              <animate attributeName="opacity" from="0" to="0.8" dur="0.4s" fill="freeze" begin="2s"/>
            </text>

            <!-- End label: ¥3,680 -->
            <text x="245" y="6" text-anchor="end" class="font-mono" font-size="13" font-weight="600" fill="#F0D68A" opacity="0">
              ¥3,680
              <animate attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze" begin="3.5s"/>
            </text>

            <!-- X-axis date labels -->
            <text x="0" y="158" class="font-mono" font-size="9" fill="rgba(245,240,232,0.3)" opacity="0">6/15
              <animate attributeName="opacity" from="0" to="1" dur="0.3s" fill="freeze" begin="2s"/>
            </text>
            <text x="60" y="158" text-anchor="middle" class="font-mono" font-size="9" fill="rgba(245,240,232,0.3)" opacity="0">6/20
              <animate attributeName="opacity" from="0" to="1" dur="0.3s" fill="freeze" begin="2.4s"/>
            </text>
            <text x="120" y="158" text-anchor="middle" class="font-mono" font-size="9" fill="rgba(245,240,232,0.3)" opacity="0">6/25
              <animate attributeName="opacity" from="0" to="1" dur="0.3s" fill="freeze" begin="2.7s"/>
            </text>
            <text x="180" y="158" text-anchor="middle" class="font-mono" font-size="9" fill="rgba(245,240,232,0.3)" opacity="0">6/28
              <animate attributeName="opacity" from="0" to="1" dur="0.3s" fill="freeze" begin="3.0s"/>
            </text>
            <text x="240" y="158" text-anchor="middle" class="font-mono" font-size="9" fill="rgba(245,240,232,0.3)" opacity="0">7/2
              <animate attributeName="opacity" from="0" to="1" dur="0.3s" fill="freeze" begin="3.3s"/>
            </text>
            <text x="300" y="158" text-anchor="middle" class="font-mono" font-size="9" fill="rgba(245,240,232,0.3)" opacity="0">7/5
              <animate attributeName="opacity" from="0" to="1" dur="0.3s" fill="freeze" begin="3.5s"/>
            </text>

          </svg>
        </div>

        <!-- Date range below chart -->
        <p class="font-body mt-2 mb-16" style="font-size: 11px; color: var(--text-muted); letter-spacing: 0.5px;">
          6月15日 — 7月5日
        </p>

        <!-- Spacer to push quote to bottom -->
        <div class="flex-1"></div>

        <!-- Bottom quote -->
        <p class="font-body mt-auto mb-8" style="font-size: 13px; font-style: italic; color: rgba(245,240,232,0.4);">
          财富是这样一步步积累的
        </p>

      </div>

    </main>

    <!-- Chart line drawing animation via CSS -->
    <style>
      @keyframes drawLine {
        from {
          stroke-dashoffset: 1000;
        }
        to {
          stroke-dashoffset: 0;
        }
      }

      .chart-line {
        animation: drawLine 2s ease-out forwards;
      }
    </style>

    <script>lucide.createIcons();</script>
</body>
</html>
