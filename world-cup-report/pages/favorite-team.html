<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>最有缘球队</title>
    <style id="theme-vars">
/* World Cup Winning Report - Cinematic Immersive Style */
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

:root {
  /* Brand Colors */
  --brand-primary: #D4A853;
  --brand-primary-light: #F0D68A;
  --brand-primary-dark: #A07D2E;
  --brand-accent: #E84855;
  --brand-accent-light: #FF6B78;
  --brand-accent-dark: #B8303C;

  /* Surface Colors */
  --bg-base: #0A0A0F;
  --bg-surface: #14141F;
  --bg-surface-elevated: #1C1C2A;
  --bg-overlay: rgba(10, 10, 15, 0.75);

  /* Text Colors */
  --text-primary: #F5F0E8;
  --text-secondary: rgba(245, 240, 232, 0.7);
  --text-muted: rgba(245, 240, 232, 0.4);
  --text-accent: #D4A853;
  --text-accent-bright: #F0D68A;

  /* Data Colors */
  --color-win: #4ADE80;
  --color-win-dim: rgba(74, 222, 128, 0.15);
  --color-profit: #4ADE80;
  --color-hot: #F97316;
  --color-hot-dim: rgba(249, 115, 22, 0.15);
  --color-streak: #FB923C;

  /* Gradients */
  --gradient-gold: linear-gradient(135deg, #D4A853 0%, #F0D68A 50%, #D4A853 100%);
  --gradient-warm: linear-gradient(135deg, #D4A853 0%, #E84855 100%);
  --gradient-deep: linear-gradient(180deg, rgba(10,10,15,0) 0%, rgba(10,10,15,0.8) 100%);

  /* Spacing */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 32px;
  --space-2xl: 48px;
  --space-3xl: 64px;

  /* Radius */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  /* Typography */
  --font-display: 'Oswald', system-ui, sans-serif;
  --font-body: 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;

  /* Motion */
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
}

/* Display font class */
.font-display {
  font-family: var(--font-display);
  letter-spacing: 0.03em;
  text-transform: uppercase;
}

/* Body font */
.font-body {
  font-family: var(--font-body);
}

/* Mono font for numbers */
.font-mono {
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
}

/* Gold text gradient */
.text-gradient-gold {
  background: var(--gradient-gold);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* Warm gradient text */
.text-gradient-warm {
  background: var(--gradient-warm);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* Cinematic overlay */
.cinematic-overlay {
  position: relative;
}

.cinematic-overlay::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(180deg, rgba(10,10,15,0.3) 0%, rgba(10,10,15,0.1) 40%, rgba(10,10,15,0.7) 100%),
    radial-gradient(ellipse at center, transparent 40%, rgba(10,10,15,0.4) 100%);
  pointer-events: none;
  z-index: 1;
}

/* Glow effects */
.glow-gold {
  box-shadow: 0 0 30px rgba(212, 168, 83, 0.3), 0 0 60px rgba(212, 168, 83, 0.1);
}

.glow-text-gold {
  text-shadow: 0 0 20px rgba(212, 168, 83, 0.4), 0 0 40px rgba(212, 168, 83, 0.2);
}

/* Card glass effect */
.glass-card {
  background: rgba(20, 20, 31, 0.6);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(212, 168, 83, 0.15);
  border-radius: var(--radius-lg);
}

/* Full bleed image background */
.bg-bleed {
  position: fixed;
  inset: 0;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* Shimmer animation for loading states */
@keyframes shimmer {
  0% { background-position: -200% center; }
  100% { background-position: 200% center; }
}

/* Particle-like decorative dots */
@keyframes float {
  0%, 100% { transform: translateY(0px) scale(1); opacity: 0.3; }
  50% { transform: translateY(-10px) scale(1.2); opacity: 0.6; }
}

/* Progress bar animation */
@keyframes progressFill {
  from { width: 0%; }
}

/* Number counter animation */
@keyframes countIn {
  from { opacity: 0; transform: translateY(10px) scale(0.9); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--brand-primary);
    --color-accent: var(--brand-accent);
  }
  @layer base {
    body { background: var(--bg-base); color: var(--text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }

      /* Page-specific styles */
      .page-bg {
        background-color: #0A0A0F;
        background-image:
          radial-gradient(ellipse at 50% 0%, rgba(212, 168, 83, 0.04) 0%, transparent 60%),
          radial-gradient(circle at 20% 80%, rgba(212, 168, 83, 0.02) 0%, transparent 40%),
          radial-gradient(circle at 80% 60%, rgba(212, 168, 83, 0.02) 0%, transparent 40%);
        min-height: 100vh;
        min-height: 100dvh;
      }

      .team-flag-highlight {
        position: relative;
      }
      .team-flag-highlight::after {
        content: '';
        position: absolute;
        inset: -4px;
        border-radius: 50%;
        border: 2px solid var(--brand-primary);
        box-shadow: 0 0 16px rgba(212, 168, 83, 0.4), 0 0 32px rgba(212, 168, 83, 0.15);
        pointer-events: none;
      }

      .team-item-active {
        background: rgba(212, 168, 83, 0.08);
        border: 1px solid rgba(212, 168, 83, 0.3);
        border-radius: var(--radius-md);
      }

      @keyframes pulseGlow {
        0%, 100% { box-shadow: 0 0 20px rgba(212, 168, 83, 0.2), 0 0 40px rgba(212, 168, 83, 0.08); }
        50% { box-shadow: 0 0 30px rgba(212, 168, 83, 0.35), 0 0 60px rgba(212, 168, 83, 0.15); }
      }

      .hero-flag-glow {
        animation: pulseGlow 3s ease-in-out infinite;
      }

      @keyframes fadeSlideUp {
        from { opacity: 0; transform: translateY(16px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .animate-in {
        animation: fadeSlideUp 0.8s var(--ease-smooth) both;
      }
      .animate-in-delay-1 { animation-delay: 0.15s; }
      .animate-in-delay-2 { animation-delay: 0.3s; }
      .animate-in-delay-3 { animation-delay: 0.45s; }
      .animate-in-delay-4 { animation-delay: 0.6s; }
      .animate-in-delay-5 { animation-delay: 0.75s; }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="page-bg flex flex-col items-center justify-start min-h-screen min-h-[100dvh] px-6 py-10 max-w-[375px] mx-auto relative">

        <!-- Subtle decorative particles -->
        <div class="absolute top-16 left-8 w-1 h-1 rounded-full bg-[#D4A853] opacity-20" style="animation: float 4s ease-in-out infinite;"></div>
        <div class="absolute top-32 right-10 w-1.5 h-1.5 rounded-full bg-[#D4A853] opacity-15" style="animation: float 5s ease-in-out infinite 1s;"></div>
        <div class="absolute bottom-40 left-12 w-1 h-1 rounded-full bg-[#D4A853] opacity-20" style="animation: float 3.5s ease-in-out infinite 0.5s;"></div>
        <div class="absolute bottom-24 right-8 w-1.5 h-1.5 rounded-full bg-[#D4A853] opacity-10" style="animation: float 6s ease-in-out infinite 2s;"></div>

        <!-- Chapter label -->
        <div class="animate-in w-full mb-6">
            <span class="font-display text-[#D4A853] text-[12px] tracking-[4px] uppercase font-normal">
                CHAPTER 06
            </span>
        </div>

        <!-- Title -->
        <div class="animate-in animate-in-delay-1 w-full mb-8">
            <h1 class="font-display text-white text-[22px] font-semibold leading-tight tracking-wide">
                你最有缘的球队是
            </h1>
        </div>

        <!-- Team flag hero -->
        <div class="animate-in animate-in-delay-2 flex flex-col items-center mb-4 w-full">
            <div class="hero-flag-glow w-28 h-28 rounded-full flex items-center justify-center bg-[rgba(212,168,83,0.06)] border border-[rgba(212,168,83,0.12)] mb-5">
                <span class="text-[64px] leading-none" role="img" aria-label="巴西国旗">🇧🇷</span>
            </div>

            <!-- Team name -->
            <h2 class="font-display text-gradient-gold text-[36px] font-bold leading-none tracking-wider mb-3">
                巴西
            </h2>

            <!-- Stats line -->
            <p class="font-body text-[14px] leading-relaxed" style="color: rgba(245, 240, 232, 0.6);">
                你一共 <span class="font-mono text-[#D4A853] font-semibold">5</span> 次猜中了ta的比赛
            </p>
        </div>

        <!-- Glass card: guessed teams -->
        <div class="animate-in animate-in-delay-3 glass-card w-full mt-8 p-5">
            <div class="flex items-center gap-2 mb-4">
                <div class="w-1 h-4 rounded-full bg-[#D4A853]"></div>
                <span class="font-display text-[#F5F0E8] text-[13px] tracking-[2px] uppercase font-medium">
                    猜中过的球队
                </span>
            </div>

            <!-- Team grid: 3 cols x 2 rows -->
            <div class="grid grid-cols-3 gap-3">
                <!-- Brazil (active) -->
                <div class="team-item-active flex flex-col items-center py-3 px-2">
                    <div class="team-flag-highlight w-11 h-11 rounded-full flex items-center justify-center mb-1.5">
                        <span class="text-[28px] leading-none" role="img" aria-label="巴西">🇧🇷</span>
                    </div>
                    <span class="font-mono text-[10px] font-medium" style="color: #D4A853;">5次</span>
                </div>

                <!-- Argentina -->
                <div class="flex flex-col items-center py-3 px-2 rounded-lg">
                    <div class="w-11 h-11 rounded-full flex items-center justify-center mb-1.5 opacity-70">
                        <span class="text-[28px] leading-none" role="img" aria-label="阿根廷">🇦🇷</span>
                    </div>
                    <span class="font-mono text-[10px] font-medium" style="color: rgba(245, 240, 232, 0.4);">3次</span>
                </div>

                <!-- France -->
                <div class="flex flex-col items-center py-3 px-2 rounded-lg">
                    <div class="w-11 h-11 rounded-full flex items-center justify-center mb-1.5 opacity-70">
                        <span class="text-[28px] leading-none" role="img" aria-label="法国">🇫🇷</span>
                    </div>
                    <span class="font-mono text-[10px] font-medium" style="color: rgba(245, 240, 232, 0.4);">3次</span>
                </div>

                <!-- Spain -->
                <div class="flex flex-col items-center py-3 px-2 rounded-lg">
                    <div class="w-11 h-11 rounded-full flex items-center justify-center mb-1.5 opacity-70">
                        <span class="text-[28px] leading-none" role="img" aria-label="西班牙">🇪🇸</span>
                    </div>
                    <span class="font-mono text-[10px] font-medium" style="color: rgba(245, 240, 232, 0.4);">2次</span>
                </div>

                <!-- Germany -->
                <div class="flex flex-col items-center py-3 px-2 rounded-lg">
                    <div class="w-11 h-11 rounded-full flex items-center justify-center mb-1.5 opacity-70">
                        <span class="text-[28px] leading-none" role="img" aria-label="德国">🇩🇪</span>
                    </div>
                    <span class="font-mono text-[10px] font-medium" style="color: rgba(245, 240, 232, 0.4);">2次</span>
                </div>

                <!-- Japan -->
                <div class="flex flex-col items-center py-3 px-2 rounded-lg">
                    <div class="w-11 h-11 rounded-full flex items-center justify-center mb-1.5 opacity-70">
                        <span class="text-[28px] leading-none" role="img" aria-label="日本">🇯🇵</span>
                    </div>
                    <span class="font-mono text-[10px] font-medium" style="color: rgba(245, 240, 232, 0.4);">1次</span>
                </div>
            </div>
        </div>

        <!-- Bottom quote -->
        <div class="animate-in animate-in-delay-5 w-full mt-10 mb-6 text-center">
            <p class="font-body text-[13px] italic leading-relaxed" style="color: rgba(245, 240, 232, 0.4);">
                有些球队，就是特别给你面子
            </p>
        </div>

    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
