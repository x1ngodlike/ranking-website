<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>最大中奖</title>
    <style id="theme-vars">
/* World Cup Winning Report - Cinematic Immersive Style */
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

:root {
  /* Brand Colors */
  --brand-primary: #D4A853;
  --brand-primary-light: #F0D68A;
  --brand-primary-dark: #A07D2E;
  --brand-accent: #E84855;
  --brand-accent-light: #FF6B78;
  --brand-accent-dark: #B8303C;

  /* Surface Colors */
  --bg-base: #0A0A0F;
  --bg-surface: #14141F;
  --bg-surface-elevated: #1C1C2A;
  --bg-overlay: rgba(10, 10, 15, 0.75);

  /* Text Colors */
  --text-primary: #F5F0E8;
  --text-secondary: rgba(245, 240, 232, 0.7);
  --text-muted: rgba(245, 240, 232, 0.4);
  --text-accent: #D4A853;
  --text-accent-bright: #F0D68A;

  /* Data Colors */
  --color-win: #4ADE80;
  --color-win-dim: rgba(74, 222, 128, 0.15);
  --color-profit: #4ADE80;
  --color-hot: #F97316;
  --color-hot-dim: rgba(249, 115, 22, 0.15);
  --color-streak: #FB923C;

  /* Gradients */
  --gradient-gold: linear-gradient(135deg, #D4A853 0%, #F0D68A 50%, #D4A853 100%);
  --gradient-warm: linear-gradient(135deg, #D4A853 0%, #E84855 100%);
  --gradient-deep: linear-gradient(180deg, rgba(10,10,15,0) 0%, rgba(10,10,15,0.8) 100%);

  /* Spacing */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 32px;
  --space-2xl: 48px;
  --space-3xl: 64px;

  /* Radius */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  /* Typography */
  --font-display: 'Oswald', system-ui, sans-serif;
  --font-body: 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;

  /* Motion */
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
}

/* Display font class */
.font-display {
  font-family: var(--font-display);
  letter-spacing: 0.03em;
  text-transform: uppercase;
}

/* Body font */
.font-body {
  font-family: var(--font-body);
}

/* Mono font for numbers */
.font-mono {
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
}

/* Gold text gradient */
.text-gradient-gold {
  background: var(--gradient-gold);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* Warm gradient text */
.text-gradient-warm {
  background: var(--gradient-warm);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* Cinematic overlay */
.cinematic-overlay {
  position: relative;
}

.cinematic-overlay::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(180deg, rgba(10,10,15,0.3) 0%, rgba(10,10,15,0.1) 40%, rgba(10,10,15,0.7) 100%),
    radial-gradient(ellipse at center, transparent 40%, rgba(10,10,15,0.4) 100%);
  pointer-events: none;
  z-index: 1;
}

/* Glow effects */
.glow-gold {
  box-shadow: 0 0 30px rgba(212, 168, 83, 0.3), 0 0 60px rgba(212, 168, 83, 0.1);
}

.glow-text-gold {
  text-shadow: 0 0 20px rgba(212, 168, 83, 0.4), 0 0 40px rgba(212, 168, 83, 0.2);
}

/* Card glass effect */
.glass-card {
  background: rgba(20, 20, 31, 0.6);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(212, 168, 83, 0.15);
  border-radius: var(--radius-lg);
}

/* Full bleed image background */
.bg-bleed {
  position: fixed;
  inset: 0;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* Shimmer animation for loading states */
@keyframes shimmer {
  0% { background-position: -200% center; }
  100% { background-position: 200% center; }
}

/* Particle-like decorative dots */
@keyframes float {
  0%, 100% { transform: translateY(0px) scale(1); opacity: 0.3; }
  50% { transform: translateY(-10px) scale(1.2); opacity: 0.6; }
}

/* Progress bar animation */
@keyframes progressFill {
  from { width: 0%; }
}

/* Number counter animation */
@keyframes countIn {
  from { opacity: 0; transform: translateY(10px) scale(0.9); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--brand-primary);
    --color-accent: var(--brand-accent);
  }
  @layer base {
    body { background: var(--brand-background); color: var(--brand-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body>
  <div class="bg-radial-gold relative min-h-screen flex flex-col items-center justify-center px-6 py-12 overflow-hidden">

    <!-- ── Sparkle Particles ── -->
    <!-- Sparkle 1 - top left area -->
    <div class="sparkle-1 absolute top-[18%] left-[15%] w-2 h-2 rounded-full" style="background: radial-gradient(circle, #F0D68A 0%, rgba(212,168,83,0) 70%);"></div>
    <!-- Sparkle 2 - top right area -->
    <div class="sparkle-2 absolute top-[25%] right-[12%] w-1.5 h-1.5 rounded-full" style="background: radial-gradient(circle, #F0D68A 0%, rgba(212,168,83,0) 70%);"></div>
    <!-- Sparkle 3 - center right -->
    <div class="sparkle-3 absolute top-[45%] right-[20%] w-2.5 h-2.5 rounded-full" style="background: radial-gradient(circle, #D4A853 0%, rgba(212,168,83,0) 70%);"></div>

    <!-- ── Content Container ── -->
    <div class="relative z-10 flex flex-col items-center text-center max-w-[375px] w-full">

      <!-- Chapter Label -->
      <div class="fade-up fade-up-d1 mb-6">
        <span class="font-display text-[12px] tracking-[4px] uppercase" style="color: var(--brand-primary);">
          Chapter 05
        </span>
      </div>

      <!-- Title -->
      <h1 class="fade-up fade-up-d2 font-display text-[24px] font-semibold text-white leading-tight mb-12">
        你最大的一笔中奖
      </h1>

      <!-- The Big Number -->
      <div class="fade-up fade-up-d3 pulse-epic mb-4">
        <span class="font-mono text-[72px] font-bold glow-win leading-none" style="color: var(--color-win);">
          ¥680
        </span>
      </div>

      <!-- Date -->
      <div class="fade-up fade-up-d4 mb-14">
        <span class="font-mono text-[16px]" style="color: rgba(245, 240, 232, 0.5);">
          7月2日
        </span>
      </div>

      <!-- Quote Card -->
      <div class="fade-up fade-up-d5 quote-card px-5 py-5 mb-16 w-full max-w-[300px] text-left">
        <p class="font-body text-[15px] italic leading-relaxed" style="color: rgba(245, 240, 232, 0.8);">
          &ldquo;这一票，买中了一整个夏天的快乐&rdquo;
        </p>
      </div>

      <!-- Bottom caption -->
      <div class="fade-up fade-up-d6">
        <p class="font-body text-[14px] leading-relaxed" style="color: rgba(245, 240, 232, 0.4);">
          这一票，买中了一整个夏天的快乐
        </p>
      </div>

    </div>

  </div>

    <style>
    /* ── Base reset ── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

    body {
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* ── Radial gold glow background ── */
    .bg-radial-gold {
      background:
        radial-gradient(ellipse 80% 60% at 50% 40%, rgba(212, 168, 83, 0.18) 0%, rgba(212, 168, 83, 0.06) 40%, transparent 70%),
        radial-gradient(ellipse 60% 50% at 50% 35%, rgba(74, 222, 128, 0.08) 0%, transparent 50%),
        var(--bg-base);
    }

    /* ── Green glow for the big number ── */
    .glow-win {
      text-shadow:
        0 0 10px rgba(74, 222, 128, 0.6),
        0 0 30px rgba(74, 222, 128, 0.4),
        0 0 60px rgba(74, 222, 128, 0.25),
        0 0 100px rgba(74, 222, 128, 0.15),
        0 0 140px rgba(74, 222, 128, 0.08);
    }

    /* ── Pulse animation on the big number ── */
    @keyframes epicPulse {
      0%, 100% { transform: scale(1.0); }
      50% { transform: scale(1.03); }
    }
    .pulse-epic {
      animation: epicPulse 3s ease-in-out infinite;
    }

    /* ── Sparkle particles ── */
    @keyframes sparkleFloat1 {
      0%   { transform: translate(0, 0) scale(1); opacity: 0; }
      15%  { opacity: 0.8; }
      50%  { transform: translate(12px, -40px) scale(1.3); opacity: 1; }
      85%  { opacity: 0.6; }
      100% { transform: translate(-8px, -70px) scale(0.8); opacity: 0; }
    }
    @keyframes sparkleFloat2 {
      0%   { transform: translate(0, 0) scale(1); opacity: 0; }
      20%  { opacity: 0.7; }
      50%  { transform: translate(-18px, -50px) scale(1.1); opacity: 0.9; }
      80%  { opacity: 0.5; }
      100% { transform: translate(10px, -80px) scale(0.6); opacity: 0; }
    }
    @keyframes sparkleFloat3 {
      0%   { transform: translate(0, 0) scale(1); opacity: 0; }
      10%  { opacity: 0.6; }
      50%  { transform: translate(8px, -35px) scale(1.4); opacity: 1; }
      90%  { opacity: 0.4; }
      100% { transform: translate(-5px, -65px) scale(0.7); opacity: 0; }
    }

    .sparkle-1 {
      animation: sparkleFloat1 4s ease-in-out infinite;
    }
    .sparkle-2 {
      animation: sparkleFloat2 5s ease-in-out infinite 1s;
    }
    .sparkle-3 {
      animation: sparkleFloat3 3.5s ease-in-out infinite 0.5s;
    }

    /* ── Quote card gold left border ── */
    .quote-card {
      border-left: 3px solid var(--brand-primary);
      background: rgba(20, 20, 31, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(212, 168, 83, 0.1);
      border-right: 1px solid rgba(212, 168, 83, 0.1);
      border-bottom: 1px solid rgba(212, 168, 83, 0.1);
      border-radius: var(--radius-lg);
    }

    /* ── Fade-in on load ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up {
      animation: fadeUp 0.8s var(--ease-smooth, cubic-bezier(0.4, 0, 0.2, 1)) both;
    }
    .fade-up-d1 { animation-delay: 0.15s; }
    .fade-up-d2 { animation-delay: 0.35s; }
    .fade-up-d3 { animation-delay: 0.55s; }
    .fade-up-d4 { animation-delay: 0.75s; }
    .fade-up-d5 { animation-delay: 0.95s; }
    .fade-up-d6 { animation-delay: 1.15s; }
  </style>
</body>
</html>
