<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>群内排名</title>
    <style id="theme-vars">
/* World Cup Winning Report - Cinematic Immersive Style */
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

:root {
  /* Brand Colors */
  --brand-primary: #D4A853;
  --brand-primary-light: #F0D68A;
  --brand-primary-dark: #A07D2E;
  --brand-accent: #E84855;
  --brand-accent-light: #FF6B78;
  --brand-accent-dark: #B8303C;

  /* Surface Colors */
  --bg-base: #0A0A0F;
  --bg-surface: #14141F;
  --bg-surface-elevated: #1C1C2A;
  --bg-overlay: rgba(10, 10, 15, 0.75);

  /* Text Colors */
  --text-primary: #F5F0E8;
  --text-secondary: rgba(245, 240, 232, 0.7);
  --text-muted: rgba(245, 240, 232, 0.4);
  --text-accent: #D4A853;
  --text-accent-bright: #F0D68A;

  /* Data Colors */
  --color-win: #4ADE80;
  --color-win-dim: rgba(74, 222, 128, 0.15);
  --color-profit: #4ADE80;
  --color-hot: #F97316;
  --color-hot-dim: rgba(249, 115, 22, 0.15);
  --color-streak: #FB923C;

  /* Gradients */
  --gradient-gold: linear-gradient(135deg, #D4A853 0%, #F0D68A 50%, #D4A853 100%);
  --gradient-warm: linear-gradient(135deg, #D4A853 0%, #E84855 100%);
  --gradient-deep: linear-gradient(180deg, rgba(10,10,15,0) 0%, rgba(10,10,15,0.8) 100%);

  /* Spacing */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 32px;
  --space-2xl: 48px;
  --space-3xl: 64px;

  /* Radius */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  /* Typography */
  --font-display: 'Oswald', system-ui, sans-serif;
  --font-body: 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;

  /* Motion */
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
}

/* Display font class */
.font-display {
  font-family: var(--font-display);
  letter-spacing: 0.03em;
  text-transform: uppercase;
}

/* Body font */
.font-body {
  font-family: var(--font-body);
}

/* Mono font for numbers */
.font-mono {
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
}

/* Gold text gradient */
.text-gradient-gold {
  background: var(--gradient-gold);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* Warm gradient text */
.text-gradient-warm {
  background: var(--gradient-warm);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* Cinematic overlay */
.cinematic-overlay {
  position: relative;
}

.cinematic-overlay::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(180deg, rgba(10,10,15,0.3) 0%, rgba(10,10,15,0.1) 40%, rgba(10,10,15,0.7) 100%),
    radial-gradient(ellipse at center, transparent 40%, rgba(10,10,15,0.4) 100%);
  pointer-events: none;
  z-index: 1;
}

/* Glow effects */
.glow-gold {
  box-shadow: 0 0 30px rgba(212, 168, 83, 0.3), 0 0 60px rgba(212, 168, 83, 0.1);
}

.glow-text-gold {
  text-shadow: 0 0 20px rgba(212, 168, 83, 0.4), 0 0 40px rgba(212, 168, 83, 0.2);
}

/* Card glass effect */
.glass-card {
  background: rgba(20, 20, 31, 0.6);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(212, 168, 83, 0.15);
  border-radius: var(--radius-lg);
}

/* Full bleed image background */
.bg-bleed {
  position: fixed;
  inset: 0;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* Shimmer animation for loading states */
@keyframes shimmer {
  0% { background-position: -200% center; }
  100% { background-position: 200% center; }
}

/* Particle-like decorative dots */
@keyframes float {
  0%, 100% { transform: translateY(0px) scale(1); opacity: 0.3; }
  50% { transform: translateY(-10px) scale(1.2); opacity: 0.6; }
}

/* Progress bar animation */
@keyframes progressFill {
  from { width: 0%; }
}

/* Number counter animation */
@keyframes countIn {
  from { opacity: 0; transform: translateY(10px) scale(0.9); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--brand-primary);
    --color-accent: var(--brand-accent);
  }
  @layer base {
    body { background: var(--brand-background); color: var(--brand-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body>

<div class="page-container">
  <!-- Background -->
  <div class="bg-image" aria-hidden="true"></div>
  <div class="bg-overlay" aria-hidden="true"></div>

  <!-- Content -->
  <div class="content-wrapper">

    <!-- Chapter Label -->
    <div class="text-center mb-2">
      <span class="font-display text-xs tracking-[4px]" style="color: var(--brand-primary); font-size: 12px;">
        CHAPTER 07
      </span>
    </div>

    <!-- Title -->
    <h1 class="font-display text-center mb-6" style="font-size: 22px; color: var(--text-primary); letter-spacing: 0.05em;">
      你在群内排名
    </h1>

    <!-- Rank Display -->
    <div class="text-center mb-3">
      <div class="font-display text-gradient-gold rank-golden-glow" style="font-size: 48px; font-weight: 700; line-height: 1.1;">
        第 3 名
      </div>
    </div>

    <!-- Title Badge -->
    <div class="text-center mb-10">
      <span class="badge-pill badge-gold font-body">实力玩家</span>
    </div>

    <!-- TOP 3 Podium -->
    <div class="grid grid-cols-3 gap-3 mb-8">
      <!-- #2 - Silver (left) -->
      <div class="podium-card">
        <div class="flex justify-center mb-3">
          <div class="avatar-circle avatar-silver">王</div>
        </div>
        <div class="font-display text-xs mb-1" style="color: var(--text-secondary); font-size: 11px;">#2</div>
        <div class="font-body text-sm mb-1" style="color: var(--text-primary); font-weight: 500;">老王</div>
        <div class="font-mono text-sm mb-2" style="color: var(--text-primary);">¥4,100</div>
        <span class="badge-pill badge-rank-silver font-display" style="font-size: 10px; letter-spacing: 0.05em;">亚军</span>
      </div>

      <!-- #1 - Gold (center) -->
      <div class="podium-card" style="border-color: rgba(212, 168, 83, 0.2); background: rgba(212, 168, 83, 0.04);">
        <div class="flex justify-center mb-3">
          <div class="avatar-circle avatar-gold" style="width: 52px; height: 52px; font-size: 18px;">张</div>
        </div>
        <div class="font-display text-xs mb-1" style="color: var(--brand-primary); font-size: 11px;">#1</div>
        <div class="font-body text-sm mb-1" style="color: var(--text-primary); font-weight: 600;">大神张三</div>
        <div class="font-mono text-sm mb-2 text-gradient-gold" style="font-weight: 600;">¥5,200</div>
        <span class="badge-pill badge-rank-champion font-display" style="font-size: 10px; letter-spacing: 0.05em;">冠军</span>
      </div>

      <!-- #3 - Bronze / Current User (right) -->
      <div class="podium-card current">
        <div class="flex justify-center mb-3">
          <div class="avatar-circle avatar-bronze current-user-highlight">李</div>
        </div>
        <div class="font-display text-xs mb-1" style="color: var(--brand-primary); font-size: 11px;">#3</div>
        <div class="font-body text-sm mb-1" style="color: var(--brand-primary); font-weight: 500;">小李</div>
        <div class="font-mono text-sm mb-2" style="color: var(--brand-primary);">¥3,680</div>
        <span class="badge-pill badge-rank-bronze font-display" style="font-size: 10px; letter-spacing: 0.05em;">季军</span>
      </div>
    </div>

    <!-- Stats Row -->
    <div class="flex gap-3 mb-8">
      <div class="stat-card">
        <div class="font-body" style="font-size: 10px; color: var(--text-muted); margin-bottom: 6px;">平均中奖</div>
        <div class="font-mono text-gradient-gold" style="font-size: 15px; font-weight: 600;">¥2,180</div>
      </div>
      <div class="stat-card">
        <div class="font-body" style="font-size: 10px; color: var(--text-muted); margin-bottom: 6px;">最高单注</div>
        <div class="font-mono text-gradient-gold" style="font-size: 15px; font-weight: 600;">¥680</div>
      </div>
      <div class="stat-card">
        <div class="font-body" style="font-size: 10px; color: var(--text-muted); margin-bottom: 6px;">人均猜中</div>
        <div class="font-mono text-gradient-gold" style="font-size: 15px; font-weight: 600;">8</div>
      </div>
    </div>

    <!-- VS Section -->
    <div class="glass-card flex items-center justify-between mb-10" style="padding: 20px 24px;">
      <div class="text-center" style="flex: 1;">
        <div class="font-body" style="font-size: 11px; color: var(--text-muted); margin-bottom: 4px;">击败人数</div>
        <div class="font-display text-gradient-gold" style="font-size: 28px; font-weight: 700;">5</div>
      </div>
      <div class="vs-divider">
        <span>&#9876;&#65039;</span>
      </div>
      <div class="text-center" style="flex: 1;">
        <div class="font-body" style="font-size: 11px; color: var(--text-muted); margin-bottom: 4px;">被压制</div>
        <div class="font-display" style="font-size: 28px; font-weight: 700; color: var(--text-secondary);">2</div>
      </div>
    </div>

    <!-- Bottom Text -->
    <div class="text-center">
      <p class="font-body" style="font-size: 13px; color: var(--text-muted); line-height: 1.6;">
        继续加油，冲击更高排名！
      </p>
    </div>

  </div>
</div>


    <style>
    body {
      margin: 0;
      padding: 0;
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: var(--font-body);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .page-container {
      width: 375px;
      max-width: 100vw;
      min-height: 100vh;
      min-height: 100dvh;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
    }

    .bg-image {
      position: fixed;
      inset: 0;
      background-image: url('../assets/pitch-aerial.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0.3;
      z-index: 0;
    }

    .bg-overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(10, 10, 15, 0.6) 0%,
        rgba(10, 10, 15, 0.4) 30%,
        rgba(10, 10, 15, 0.7) 70%,
        rgba(10, 10, 15, 0.9) 100%
      );
      z-index: 1;
    }

    .content-wrapper {
      position: relative;
      z-index: 2;
      padding: 0 20px;
      padding-top: 48px;
      padding-bottom: 60px;
    }

    /* Rank number glow */
    .rank-golden-glow {
      text-shadow:
        0 0 20px rgba(212, 168, 83, 0.5),
        0 0 40px rgba(212, 168, 83, 0.3),
        0 0 80px rgba(212, 168, 83, 0.15);
    }

    /* Avatar circles */
    .avatar-circle {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      position: relative;
    }

    .avatar-gold {
      background: linear-gradient(135deg, rgba(212, 168, 83, 0.3), rgba(240, 214, 138, 0.15));
      border: 2px solid #D4A853;
      box-shadow: 0 0 15px rgba(212, 168, 83, 0.3);
    }

    .avatar-silver {
      background: linear-gradient(135deg, rgba(192, 192, 192, 0.25), rgba(220, 220, 220, 0.1));
      border: 2px solid #C0C0C0;
    }

    .avatar-bronze {
      background: linear-gradient(135deg, rgba(205, 127, 50, 0.25), rgba(205, 127, 50, 0.1));
      border: 2px solid #CD7F32;
    }

    /* Current user highlight ring */
    .current-user-highlight {
      box-shadow:
        0 0 0 2px rgba(212, 168, 83, 0.4),
        0 0 20px rgba(212, 168, 83, 0.2),
        0 0 40px rgba(212, 168, 83, 0.1);
      animation: pulse-ring 2s ease-in-out infinite;
    }

    @keyframes pulse-ring {
      0%, 100% {
        box-shadow:
          0 0 0 2px rgba(212, 168, 83, 0.4),
          0 0 20px rgba(212, 168, 83, 0.2);
      }
      50% {
        box-shadow:
          0 0 0 4px rgba(212, 168, 83, 0.2),
          0 0 30px rgba(212, 168, 83, 0.35);
      }
    }

    /* Badge pill */
    .badge-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 4px 16px;
      border-radius: var(--radius-full);
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 500;
    }

    .badge-gold {
      border: 1px solid var(--brand-primary);
      color: var(--brand-primary);
      background: rgba(212, 168, 83, 0.08);
    }

    .badge-rank-champion {
      background: rgba(212, 168, 83, 0.15);
      color: #F0D68A;
      font-size: 10px;
      padding: 2px 8px;
      margin-top: 4px;
    }

    .badge-rank-silver {
      background: rgba(192, 192, 192, 0.12);
      color: #E0E0E0;
      font-size: 10px;
      padding: 2px 8px;
      margin-top: 4px;
    }

    .badge-rank-bronze {
      background: rgba(205, 127, 50, 0.12);
      color: #E8A060;
      font-size: 10px;
      padding: 2px 8px;
      margin-top: 4px;
    }

    /* Podium card */
    .podium-card {
      background: rgba(20, 20, 31, 0.5);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: var(--radius-xl);
      padding: 24px 12px;
      text-align: center;
      transition: all 0.3s var(--ease-smooth);
    }

    .podium-card.current {
      border-color: rgba(212, 168, 83, 0.25);
      background: rgba(212, 168, 83, 0.05);
    }

    /* Mini stat glass card */
    .stat-card {
      flex: 1;
      background: rgba(20, 20, 31, 0.55);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: var(--radius-md);
      padding: 14px 8px;
      text-align: center;
    }

    /* VS divider */
    .vs-divider {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(20, 20, 31, 0.8);
      border: 1px solid rgba(212, 168, 83, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
  </style>
</body>
</html>
