<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专属称号</title>
    <style id="theme-vars">
/* World Cup Winning Report - Cinematic Immersive Style */
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

:root {
  /* Brand Colors */
  --brand-primary: #D4A853;
  --brand-primary-light: #F0D68A;
  --brand-primary-dark: #A07D2E;
  --brand-accent: #E84855;
  --brand-accent-light: #FF6B78;
  --brand-accent-dark: #B8303C;

  /* Surface Colors */
  --bg-base: #0A0A0F;
  --bg-surface: #14141F;
  --bg-surface-elevated: #1C1C2A;
  --bg-overlay: rgba(10, 10, 15, 0.75);

  /* Text Colors */
  --text-primary: #F5F0E8;
  --text-secondary: rgba(245, 240, 232, 0.7);
  --text-muted: rgba(245, 240, 232, 0.4);
  --text-accent: #D4A853;
  --text-accent-bright: #F0D68A;

  /* Data Colors */
  --color-win: #4ADE80;
  --color-win-dim: rgba(74, 222, 128, 0.15);
  --color-profit: #4ADE80;
  --color-hot: #F97316;
  --color-hot-dim: rgba(249, 115, 22, 0.15);
  --color-streak: #FB923C;

  /* Gradients */
  --gradient-gold: linear-gradient(135deg, #D4A853 0%, #F0D68A 50%, #D4A853 100%);
  --gradient-warm: linear-gradient(135deg, #D4A853 0%, #E84855 100%);
  --gradient-deep: linear-gradient(180deg, rgba(10,10,15,0) 0%, rgba(10,10,15,0.8) 100%);

  /* Spacing */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 32px;
  --space-2xl: 48px;
  --space-3xl: 64px;

  /* Radius */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  /* Typography */
  --font-display: 'Oswald', system-ui, sans-serif;
  --font-body: 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;

  /* Motion */
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
}

/* Display font class */
.font-display {
  font-family: var(--font-display);
  letter-spacing: 0.03em;
  text-transform: uppercase;
}

/* Body font */
.font-body {
  font-family: var(--font-body);
}

/* Mono font for numbers */
.font-mono {
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
}

/* Gold text gradient */
.text-gradient-gold {
  background: var(--gradient-gold);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* Warm gradient text */
.text-gradient-warm {
  background: var(--gradient-warm);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* Cinematic overlay */
.cinematic-overlay {
  position: relative;
}

.cinematic-overlay::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(180deg, rgba(10,10,15,0.3) 0%, rgba(10,10,15,0.1) 40%, rgba(10,10,15,0.7) 100%),
    radial-gradient(ellipse at center, transparent 40%, rgba(10,10,15,0.4) 100%);
  pointer-events: none;
  z-index: 1;
}

/* Glow effects */
.glow-gold {
  box-shadow: 0 0 30px rgba(212, 168, 83, 0.3), 0 0 60px rgba(212, 168, 83, 0.1);
}

.glow-text-gold {
  text-shadow: 0 0 20px rgba(212, 168, 83, 0.4), 0 0 40px rgba(212, 168, 83, 0.2);
}

/* Card glass effect */
.glass-card {
  background: rgba(20, 20, 31, 0.6);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(212, 168, 83, 0.15);
  border-radius: var(--radius-lg);
}

/* Full bleed image background */
.bg-bleed {
  position: fixed;
  inset: 0;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* Shimmer animation for loading states */
@keyframes shimmer {
  0% { background-position: -200% center; }
  100% { background-position: 200% center; }
}

/* Particle-like decorative dots */
@keyframes float {
  0%, 100% { transform: translateY(0px) scale(1); opacity: 0.3; }
  50% { transform: translateY(-10px) scale(1.2); opacity: 0.6; }
}

/* Progress bar animation */
@keyframes progressFill {
  from { width: 0%; }
}

/* Number counter animation */
@keyframes countIn {
  from { opacity: 0; transform: translateY(10px) scale(0.9); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--bg-base);
    --color-foreground: var(--text-primary);
    --color-card: var(--bg-surface);
    --color-card-foreground: var(--text-primary);
    --color-primary: var(--brand-primary);
    --color-primary-foreground: var(--bg-base);
    --color-muted: var(--bg-surface-elevated);
    --color-muted-foreground: var(--text-muted);
    --color-border: rgba(212, 168, 83, 0.15);
    --color-ring: var(--brand-primary);
    --radius-sm: var(--radius-sm);
    --radius-md: var(--radius-md);
    --radius-lg: var(--radius-lg);
    --radius-xl: var(--radius-xl);
  }
  @layer base {
    body { background: var(--bg-base); color: var(--text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased overflow-hidden">

    <!-- Background image at 25% opacity -->
    <div class="bg-bleed" style="background-image: url('../assets/scoreboard.jpg'); opacity: 0.25;"></div>

    <!-- Dark gradient overlay, heavier at bottom -->
    <div class="fixed inset-0 z-[1]" style="background: linear-gradient(to bottom, rgba(10,10,15,0.3) 0%, rgba(10,10,15,0.15) 30%, rgba(10,10,15,0.5) 70%, rgba(10,10,15,0.95) 100%);"></div>

    <!-- Main content -->
    <main class="relative z-10 min-h-screen flex flex-col items-center justify-center px-6 py-12" style="max-width: 375px; margin: 0 auto;">

        <!-- Trophy emoji -->
        <div class="text-center mb-6" style="animation: float 3s ease-in-out infinite;">
            <span style="font-size: 56px; line-height: 1;">&#127942;</span>
        </div>

        <!-- Label: 你的专属称号 -->
        <p class="font-body text-center mb-4" style="font-size: 13px; color: rgba(245, 240, 232, 0.5); letter-spacing: 0.05em;">
            你的专属称号
        </p>

        <!-- Title: 金库霸主 with gold shimmer -->
        <h1 class="font-display text-gradient-gold text-center mb-4" style="
            font-size: 40px;
            line-height: 1.1;
            text-shadow: 0 0 20px rgba(212, 168, 83, 0.4), 0 0 40px rgba(212, 168, 83, 0.2);
            background-image: linear-gradient(90deg, #D4A853 0%, #F0D68A 25%, #D4A853 50%, #F0D68A 75%, #D4A853 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 4s linear infinite;
        ">
            金库霸主
        </h1>

        <!-- Description -->
        <p class="font-body text-center mb-10" style="font-size: 16px; color: rgba(245, 240, 232, 0.7);">
            这个夏天，你是真正的赢家
        </p>

        <!-- Glass card summary -->
        <div class="glass-card w-full px-5 py-0 mb-12" style="max-width: 320px;">
            <!-- Row 1: 累计盈利 -->
            <div class="flex items-center justify-between py-4">
                <span class="font-body" style="font-size: 14px; color: rgba(245, 240, 232, 0.5);">累计盈利</span>
                <span class="font-mono" style="font-size: 20px; font-weight: 600; color: var(--color-win);">&#165;3,680</span>
            </div>
            <!-- Divider -->
            <div style="height: 1px; background: rgba(212, 168, 83, 0.1);"></div>
            <!-- Row 2: 猜中场次 -->
            <div class="flex items-center justify-between py-4">
                <span class="font-body" style="font-size: 14px; color: rgba(245, 240, 232, 0.5);">猜中场次</span>
                <span class="font-mono" style="font-size: 20px; font-weight: 600; color: var(--text-primary);">12 场</span>
            </div>
            <!-- Divider -->
            <div style="height: 1px; background: rgba(212, 168, 83, 0.1);"></div>
            <!-- Row 3: 群内排名 -->
            <div class="flex items-center justify-between py-4">
                <span class="font-body" style="font-size: 14px; color: rgba(245, 240, 232, 0.5);">群内排名</span>
                <span class="font-mono text-gradient-gold" style="font-size: 20px; font-weight: 600;">第 3 名 / 共 8 人</span>
            </div>
        </div>

        <!-- Bottom closing message -->
        <div class="text-center space-y-2" style="animation: fadeIn 2s ease-out 0.5s both;">
            <p class="font-body" style="font-size: 15px; color: rgba(245, 240, 232, 0.4);">
                感谢这个夏天的每一次心跳
            </p>
            <p class="font-body" style="font-size: 15px; color: rgba(245, 240, 232, 0.3);">
                我们下届世界杯，再见
            </p>
        </div>

    </main>

    <!-- Custom animations for this page -->
    <style>
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Page-level fade-in sequence */
        main > * {
            animation: fadeIn 1s var(--ease-smooth) both;
        }
        main > *:nth-child(1) { animation-delay: 0.1s; }
        main > *:nth-child(2) { animation-delay: 0.3s; }
        main > *:nth-child(3) { animation-delay: 0.5s; }
        main > *:nth-child(4) { animation-delay: 0.7s; }
        main > *:nth-child(5) { animation-delay: 0.9s; }
        main > *:nth-child(6) { animation-delay: 1.3s; }
    </style>

    <script>lucide.createIcons();</script>
</body>
</html>
