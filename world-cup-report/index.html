<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>世界杯中奖报告 - 完整预览</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: #0A0A0F;
      color: #F5F0E8;
      font-family: 'Inter', system-ui, sans-serif;
      overflow-x: hidden;
    }

    .nav-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(10, 10, 15, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(212, 168, 83, 0.12);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-bar h1 {
      font-size: 14px;
      font-weight: 600;
      background: linear-gradient(135deg, #D4A853, #F0D68A);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .nav-bar span {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: rgba(245, 240, 232, 0.4);
    }

    .pages-container {
      max-width: 420px;
      margin: 0 auto;
      padding: 60px 12px 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .page-frame {
      position: relative;
      width: 100%;
      aspect-ratio: 9 / 16;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(212, 168, 83, 0.1);
      background: #14141F;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .page-frame:hover {
      border-color: rgba(212, 168, 83, 0.3);
      box-shadow: 0 4px 32px rgba(212, 168, 83, 0.1);
    }
    .page-frame iframe {
      width: 375px;
      height: 667px;
      border: none;
      transform-origin: top left;
      pointer-events: none;
    }
    .page-label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 8px 12px;
      background: linear-gradient(transparent, rgba(10, 10, 15, 0.9));
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .page-label .num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #D4A853;
      opacity: 0.7;
    }
    .page-label .name {
      font-size: 12px;
      color: rgba(245, 240, 232, 0.6);
    }

    .view-fullscreen {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: #D4A853;
      text-decoration: none;
      padding: 4px 10px;
      border: 1px solid rgba(212, 168, 83, 0.25);
      border-radius: 6px;
      transition: all 0.2s;
      pointer-events: auto;
    }
    .view-fullscreen:hover {
      background: rgba(212, 168, 83, 0.1);
      border-color: rgba(212, 168, 83, 0.5);
    }
  </style>
</head>
<body>
  <div class="nav-bar">
    <h1>世界杯中奖报告 - 沉浸式设计</h1>
    <span>9 pages / mobile</span>
  </div>

  <div class="pages-container" id="pages"></div>

  <script>
    const pages = [
      { file: 'cover.html', label: '封面', num: '01/09' },
      { file: 'first-win.html', label: '开门红', num: '02/09' },
      { file: 'overview.html', label: '总览数据', num: '03/09' },
      { file: 'wealth-curve.html', label: '财富曲线', num: '04/09' },
      { file: 'best-day.html', label: '巅峰时刻', num: '05/09' },
      { file: 'biggest-win.html', label: '最大中奖', num: '06/09' },
      { file: 'favorite-team.html', label: '最有缘球队', num: '07/09' },
      { file: 'social-rank.html', label: '群内排名', num: '08/09' },
      { file: 'ending.html', label: '专属称号', num: '09/09' },
    ];

    const container = document.getElementById('pages');

    pages.forEach(p => {
      const frame = document.createElement('div');
      frame.className = 'page-frame';

      const iframe = document.createElement('iframe');
      iframe.src = 'pages/' + p.file;
      iframe.loading = 'lazy';
      iframe.setAttribute('sandbox', 'allow-same-origin');

      // Scale iframe to fit container width
      const scaleFrame = () => {
        const w = frame.clientWidth;
        const s = w / 375;
        iframe.style.transform = `scale(${s})`;
        iframe.style.width = '375px';
        iframe.style.height = '667px';
      };
      scaleFrame();
      window.addEventListener('resize', scaleFrame);

      const label = document.createElement('div');
      label.className = 'page-label';
      label.innerHTML = `
        <span class="num">${p.num}</span>
        <span class="name">${p.label}</span>
        <a class="view-fullscreen" href="pages/${p.file}" target="_blank">&#x26F6; 全屏</a>
      `;

      frame.appendChild(iframe);
      frame.appendChild(label);
      container.appendChild(frame);
    });
  </script>
</body>
</html>
