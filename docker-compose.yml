version: '3.8'

services:
  ranking-website:
    build: .
    container_name: ranking-website
    restart: unless-stopped
    ports:
      - "5936:5936"
    environment:
      - PORT=5936
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?请先设置 ADMIN_PASSWORD}
      - NODE_ENV=production
      - TZ=Asia/Shanghai
      - AUTO_BACKUP_INTERVAL_MS=3600000
      - MAX_BACKUPS=30
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5936/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
