version: '3.8'

services:
  world-cup-betting:
    build: .
    container_name: world-cup-betting
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - ADMIN_PASSWORD=159357
      - NODE_ENV=production
      - TZ=Asia/Shanghai
      - AUTO_BACKUP_INTERVAL_MS=3600000
      - MAX_BACKUPS=30
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
